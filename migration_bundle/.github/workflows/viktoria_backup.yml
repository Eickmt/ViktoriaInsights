name: ViktoriaInsights Datenbank-Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Grund fuer manuelles Backup'
        required: false
        default: 'Manuelles Backup'

permissions:
  contents: read
  actions: write

jobs:
  backup:
    name: Datenbank sichern
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automation/viktoria-insights

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Python 3.11 installieren
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: automation/viktoria-insights/requirements.txt

      - name: Python-Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install supabase pandas openpyxl

      - name: Datenbank-Backup erstellen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Starte ViktoriaInsights Backup..."
          python backup_script.py
          echo "Backup-Script abgeschlossen"

      - name: Backup-Dateien auflisten
        run: |
          echo "Erstellte Backup-Dateien:"
          ls -la backup_* 2>/dev/null || echo "Keine Backup-Dateien gefunden"

      - name: Backup-Dateien speichern
        uses: actions/upload-artifact@v4
        with:
          name: viktoria-backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            automation/viktoria-insights/backup_*.xlsx
            automation/viktoria-insights/backup_*.md
          retention-days: 30
          compression-level: 6

      - name: Backup-Statistiken
        run: |
          echo "Backup-Zusammenfassung:"
          echo "Datum: $(date '+%d.%m.%Y %H:%M:%S')"
          echo "Run-Nummer: ${{ github.run_number }}"
          echo "Artifact-Name: viktoria-backup-${{ github.run_number }}-${{ github.run_attempt }}"
          if ls backup_*.xlsx 1> /dev/null 2>&1; then
            echo "Backup-Groessen:"
            du -h backup_*.xlsx
          fi

      - name: Erfolgs-Benachrichtigung
        if: success()
        run: |
          echo "ViktoriaInsights Backup erfolgreich abgeschlossen."
          echo "Download: GitHub -> Actions -> Artifacts"

      - name: Fehler-Benachrichtigung
        if: failure()
        run: |
          echo "ViktoriaInsights Backup fehlgeschlagen."
          echo "Logs pruefen fuer Details."

  cleanup:
    name: Alte Backups bereinigen
    runs-on: ubuntu-latest
    needs: backup
    if: always()

    steps:
      - name: Alte Artifacts loeschen
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            let deletedCount = 0;

            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name.startsWith('viktoria-backup-') &&
                  new Date(artifact.created_at) < thirtyDaysAgo) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id
                  });
                  console.log(`Geloescht: ${artifact.name}`);
                  deletedCount++;
                } catch (error) {
                  console.log(`Fehler beim Loeschen von ${artifact.name}:`, error.message);
                }
              }
            }

            console.log(`${deletedCount} alte Backup-Artifacts geloescht`);
